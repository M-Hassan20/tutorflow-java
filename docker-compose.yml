version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: tutorflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - tutorflow-net

  redis:
    image: redis:7-alpine
    container_name: tutorflow-redis
    ports:
      - "6379:6379"
    networks:
      - tutorflow-net

networks:
  tutorflow-net:
    driver: bridge

volumes:
  mysql_data: