server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: execution-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/execution/**
        - id: dryrun-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/dryrun/**