server:
  port: 8084

spring:
  application:
    name: tutor-service
  datasource:
    url: jdbc:mysql://localhost:3307/tutorflow_tutor
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

parent-service:
  url: http://localhost:8085