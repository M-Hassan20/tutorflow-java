server:
  port: 8085

spring:
  application:
    name: parent-service
  datasource:
    url: jdbc:mysql://localhost:3307/tutorflow_parent
    username: tutorflow
    password: tutorflow123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

tutor-service:
  url: http://localhost:8084

xp:
  first-attempt: 100
  second-attempt: 75
  third-attempt-plus: 50

reports:
  schedule:
    weekly: "0 0 8 * * MON"
    monthly: "0 0 8 1 * *"